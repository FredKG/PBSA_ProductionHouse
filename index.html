<!DOCTYPE html>
<html>
    <head>
        <title>Login - Screen Space Estimator</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #000000;
                color: #FFFFFF;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }
            .header {
                background-color: #B8860B; 
                width: 100%;
                padding: 10px;
                text-align: center;
                position: absolute;
                top: 0;
            }
            .logo-header {
                font-size: 32px;
                color: #000000; 
                font-weight: bold;
            }
            .login-container {
                background-color: #1A1A1A;
                padding: 40px;
                border: 2px solid #B8860B;
                border-radius: 8px;
                text-align: center;
                width: 90%;
                max-width: 350px;
                box-shadow: 0 4px 15px rgba(184, 134, 11, 0.2);
            }
            .login-container img {
                margin-bottom: 20px;
            }
            .login-container h2 {
                margin-top: 0;
                color: #B8860B;
            }
            input[type="password"] {
                width: 100%;
                padding: 10px;
                margin: 15px 0;
                background-color: #000000; 
                border: 1px solid #B8860B; 
                color: #FFFFFF; 
                box-sizing: border-box;
                font-size: 16px;
                text-align: center;
            }
            button {
                background-color: #B8860B; 
                color: #000000; 
                padding: 12px;
                border: none;
                width: 100%;
                font-weight: bold;
                cursor: pointer;
                font-size: 16px;
            }
            button:hover {
                background-color: #C59B27; 
            }
            #errorMessage {
                color: #ff4444;
                margin-top: 15px;
                font-size: 14px;
                min-height: 20px;
            }
        </style>
    </head>

    <body>
        <div class="header">
            <div class="logo-header">
                Screen Space Estimator
            </div>
        </div>

        <div class="login-container">
            <img src="./PBSA_productionHouse.jpg" width="160" height="130" alt="PBS Logo">
            <h2>Authorized Access Only</h2>
            
            <label for="pinInput">Please enter your PIN:</label>
            <input type="password" id="pinInput" placeholder="Enter PIN here" onkeypress="handleKeyPress(event)">
            
            <button onclick="attemptLogin()">Login</button>
            
            <div id="errorMessage"></div>
        </div>

        <script>
            function attemptLogin() {
                const enteredPin = document.getElementById('pinInput').value;
                const errorMessage = document.getElementById('errorMessage');

                if (enteredPin === 'Ph@us3') {
                    errorMessage.style.color = '#00ffcc'; 
                    errorMessage.innerText = 'Access Granted. Redirecting...';
                    
                    
                    setTimeout(() => {
                        window.location.href = 'estimator.html';
                    }, 500); 
                } else {
                    errorMessage.style.color = '#ff4444';
                    errorMessage.innerText = 'Incorrect PIN. Please try again.';
                    document.getElementById('pinInput').value = '';
                }
            }

            function handleKeyPress(event) {
                if (event.key === 'Enter') {
                    attemptLogin();
                }
            }
        </script>
    </body>
</html>
